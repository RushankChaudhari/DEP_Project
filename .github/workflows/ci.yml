name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        cd Backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Ruff Linting
      run: |
        cd Backend
        ruff check .
    - name: Run Pytest
      run: |
        cd Backend
        pytest

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      run: |
        cd dep
        npm ci || npm install
    - name: Run Next.js Build (includes type check and lint)
      run: |
        cd dep
        npm run build
    - name: Run Vitest
      run: |
        cd dep
        npm run test
